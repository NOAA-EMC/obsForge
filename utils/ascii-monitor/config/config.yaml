system: ocean
model: gdas

data_root: /lfs/h2/emc/da/noscrub/emc.da/obsForge/COMROOT/realtime
report_root: /lfs/h2/emc/obsproc/noscrub/edward.givelberg/newmonitor/reports

cycles: [0, 6, 12, 18]
detect_from_filesystem: true

# scan start and end dates (optional)
# if no scan dates are specified, the single latest found cycle
# is scanned
# start_cycle: '2026042200'
# end_cycle: '2026042418'

history:
  window_days: 30

thresholds:
  ratio: 0.8

flags:
  low: "+"
  medium: "*"
  high: "**"

report:
  include_comment_header: true

# =========================================
# OBS SPACES (ORDER DEFINES REPORT ORDER)
# =========================================
